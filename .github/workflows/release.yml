name: Release VST3

# Normal branch pushes intentionally do not run this workflow. Use a manual
# dispatch for a candidate build, push a v* tag for a release build, or publish a
# GitHub Release to build and attach VST3 zips.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional release tag for artifact names or manual release upload, for example v0.2.0'
        required: false
        type: string
      attach_to_release:
        description: 'Upload manual-build assets to the release_tag release as draft/prerelease if needed'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  validate-release-inputs:
    name: Validate release inputs
    runs-on: ubuntu-24.04
    steps:
      - name: Validate manual release upload inputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          ATTACH_TO_RELEASE: ${{ inputs.attach_to_release }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$ATTACH_TO_RELEASE" = "true" ] && [ -z "$RELEASE_TAG" ]; then
            echo "release_tag is required when attach_to_release is enabled" >&2
            exit 1
          fi

  vst3:
    name: ${{ matrix.label }} VST3
    needs: validate-release-inputs
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            os: windows-latest
            artifact_suffix: windows
            python: python
            build_parallel: 2
          - label: Linux
            os: ubuntu-24.04
            artifact_suffix: linux
            python: python3
            build_parallel: 1
          - label: macOS
            os: macos-14
            artifact_suffix: macos
            python: python3
            build_parallel: 2

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libgtk-3-dev \
            libjack-jackd2-dev \
            libglu1-mesa-dev \
            libwebkit2gtk-4.1-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxkbcommon-x11-dev \
            libxrandr-dev \
            libxrender-dev \
            mesa-common-dev

      - name: Configure
        run: cmake -S . -B build-release -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-release --config Release --parallel ${{ matrix.build_parallel }}

      - name: Test
        run: ctest --test-dir build-release -C Release --output-on-failure

      - name: Preset QA
        shell: pwsh
        run: ./scripts/verify-presets.ps1 -BuildRoot build-release -Python ${{ matrix.python }}

      - name: Package VST3
        id: package
        shell: pwsh
        env:
          ARTIFACT_SUFFIX: ${{ matrix.artifact_suffix }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          $tag = $env:INPUT_RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($tag)) {
            if ($env:EVENT_NAME -eq "workflow_dispatch") {
              $tag = "manual-$env:RUN_NUMBER"
            } else {
              $tag = $env:RELEASE_TAG
            }
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "manual-$env:RUN_NUMBER"
          }

          $safeTag = $tag -replace '[^A-Za-z0-9._-]', '-'
          $artifactName = "Chipper-$safeTag-$env:ARTIFACT_SUFFIX-vst3"
          $packageRoot = Join-Path $env:RUNNER_TEMP $artifactName
          $candidatePaths = @(
            "build-release/Chipper_artefacts/Release/VST3/Chipper.vst3",
            "build-release/Chipper_artefacts/VST3/Chipper.vst3",
            "build-release/Chipper_artefacts/RelWithDebInfo/VST3/Chipper.vst3"
          )
          $vst3Source = $candidatePaths |
            ForEach-Object { Join-Path (Get-Location) $_ } |
            Where-Object { Test-Path -LiteralPath $_ -PathType Container } |
            Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($vst3Source)) {
            $vst3Source = Get-ChildItem -Path (Join-Path (Get-Location) "build-release") -Recurse -Filter Chipper.vst3 -ErrorAction SilentlyContinue |
              Where-Object { $_.PSIsContainer -and $_.FullName -match [regex]::Escape("VST3") } |
              Select-Object -ExpandProperty FullName -First 1
          }

          if ([string]::IsNullOrWhiteSpace($vst3Source) -or !(Test-Path -LiteralPath $vst3Source -PathType Container)) {
            throw "VST3 bundle was not found under build-release"
          }

          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          Copy-Item -LiteralPath $vst3Source -Destination $packageRoot -Recurse -Force
          Copy-Item -LiteralPath README.md -Destination $packageRoot -Force
          Copy-Item -LiteralPath THIRD_PARTY_NOTICES.md -Destination $packageRoot -Force
          if (Test-Path -LiteralPath CHANGELOG.md) {
            Copy-Item -LiteralPath CHANGELOG.md -Destination $packageRoot -Force
          }
          if (Test-Path -LiteralPath LICENSE) {
            Copy-Item -LiteralPath LICENSE -Destination $packageRoot -Force
          }

          $zipPath = Join-Path (Get-Location) "$artifactName.zip"
          Compress-Archive -Path (Join-Path $packageRoot "*") -DestinationPath $zipPath -Force
          $shaPath = "$zipPath.sha256"
          $hash = (Get-FileHash -LiteralPath $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          $zipName = Split-Path $zipPath -Leaf
          "$hash  $zipName" | Out-File -LiteralPath $shaPath -Encoding ascii

          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          "sha_path=$shaPath" >> $env:GITHUB_OUTPUT
          "artifact_name=$artifactName" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.sha_path }}
          if-no-files-found: error

      - name: Attach assets to GitHub Release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.attach_to_release)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          TARGET_RELEASE_TAG: ${{ inputs.release_tag || github.event.release.tag_name }}
          ZIP_PATH: ${{ steps.package.outputs.zip_path }}
          SHA_PATH: ${{ steps.package.outputs.sha_path }}
        run: |
          $tag = $env:TARGET_RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "release_tag is required when attach_to_release is enabled for a manual release build"
          }

          & gh release view $tag *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          if (-not $releaseExists) {
            & gh release create $tag --draft --prerelease --title "Chipper $tag" --notes "Draft Chipper VST3 release build for $tag. Download the zip for your platform, verify the SHA256 checksum, and see README.md plus THIRD_PARTY_NOTICES.md inside the package."
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create draft release $tag"
            }
          }

          & gh release upload $tag $env:ZIP_PATH $env:SHA_PATH --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload release assets for $tag"
          }

  publish-tag-release:
    name: Publish tag release
    needs: vst3
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -t zips < <(find release-artifacts -maxdepth 1 -type f -name 'Chipper-*.zip' | sort)
          mapfile -t assets < <(find release-artifacts -maxdepth 1 -type f \( -name 'Chipper-*.zip' -o -name 'Chipper-*.zip.sha256' \) | sort)
          if [ "${#zips[@]}" -eq 0 ]; then
            echo "No release zip artifacts were downloaded" >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --title "Chipper $RELEASE_TAG" \
              --draft \
              --prerelease \
              --notes "Draft automated Chipper VST3 release build for $RELEASE_TAG. Download the zip for your platform, verify the SHA256 checksum, and see README.md plus THIRD_PARTY_NOTICES.md inside the package."
          fi
