          font-family="Cascadia Mono, Consolas, DejaVu Sans Mono, Liberation Mono, Menlo, monospace"
          font-size="31"
          font-weight="700"
          letter-spacing="0">
<tspan x="48" dy="0">   ‚ĖĄ‚Ėą‚Ėą‚Ėą‚Ėą‚ĖĄ   ‚Ėą‚Ėą  ‚Ėą‚Ėą  ‚Ėą‚Ėą  ‚Ėą‚Ėą‚Ėď‚Ėą‚Ėą‚Ėą   ‚Ėą‚Ėą‚Ėď‚Ėą‚Ėą‚Ėą  ‚Ėď‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą  ‚Ėą‚Ėą‚ĖÄ‚Ėą‚Ėą‚Ėą  </tspan>
<tspan x="48" dy="34">   ‚Ėą‚Ėą‚ĖÄ ‚ĖÄ‚Ėą  ‚Ėď‚Ėą‚Ėą  ‚Ėą‚Ėą ‚Ėď‚Ėą‚Ėą ‚Ėď‚Ėą‚Ėą   ‚Ėą‚Ėą ‚Ėď‚Ėą‚Ėą   ‚Ėą‚Ėą ‚Ėď‚Ėą   ‚ĖÄ ‚Ėď‚Ėą‚Ėą   ‚Ėą‚Ėą</tspan>
<tspan x="48" dy="34">   ‚Ėď‚Ėą    ‚ĖĄ  ‚Ėą‚Ėą‚ĖÄ‚ĖÄ‚Ėą‚Ėą  ‚Ėą‚Ėą  ‚Ėą‚Ėą  ‚Ėą‚Ėą   ‚Ėą‚Ėą  ‚Ėą‚Ėą   ‚Ėą‚Ėą‚Ėą    ‚Ėą‚Ėą  ‚ĖĄ‚Ėą</tspan>
<tspan x="48" dy="34">   ‚Ėď‚Ėď‚ĖĄ ‚ĖĄ‚Ėą‚Ėą  ‚Ėď‚Ėą  ‚Ėą‚Ėą  ‚Ėą‚Ėą  ‚Ėą‚Ėą‚ĖĄ‚Ėą     ‚Ėą‚Ėą‚ĖĄ‚Ėą     ‚Ėď‚Ėą  ‚ĖĄ  ‚Ėą‚Ėą‚ĖÄ‚ĖÄ‚Ėą‚ĖĄ  </tspan>
<tspan x="48" dy="34">    ‚Ėď‚Ėą‚Ėą‚Ėą‚ĖÄ   ‚Ėď‚Ėą  ‚Ėą‚Ėą  ‚Ėą‚Ėą  ‚Ėą‚Ėą       ‚Ėą‚Ėą        ‚Ėą‚Ėą‚Ėą‚Ėą  ‚Ėą‚Ėą   ‚Ėą‚Ėą</tspan>
    </text>
