<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="280" viewBox="0 0 1160 280" role="img" aria-labelledby="title desc">
  <title id="title">Chipper ASCII logo</title>
  <desc id="desc">A retro scene-style block ASCII Chipper logo in a terminal-inspired frame.</desc>
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111417"/>
      <stop offset="1" stop-color="#0a0d0f"/>
    </linearGradient>
    <linearGradient id="scanGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5a3a"/>
      <stop offset="0.45" stop-color="#ffd85a"/>
      <stop offset="0.72" stop-color="#64d96b"/>
      <stop offset="1" stop-color="#5fd7ff"/>
    </linearGradient>
    <filter id="softGlow" x="-12%" y="-22%" width="124%" height="144%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#293238" stroke-width="1" opacity="0.32"/>
    </pattern>
  </defs>

  <rect width="1160" height="280" rx="18" fill="url(#screen)"/>
  <rect x="1" y="1" width="1158" height="278" rx="17" fill="none" stroke="#3a454c"/>
  <rect x="0" y="0" width="1160" height="280" rx="18" fill="url(#grid)"/>
  <rect x="32" y="224" width="1010" height="6" rx="3" fill="#ff5a3a"/>
  <rect x="1050" y="224" width="78" height="6" rx="3" fill="#5fd7ff"/>

